[[build.env]]
name = "NODE_ENV"
value = "production"

[[build.env]]
name = "NPM_CONFIG_PRODUCTION"
value = "false"

[[build.env]]
name = "GOOGLE_RUNTIME_VERSION"
value = "24"

[[build.buildpacks]]
uri = "gcr.io/buildpacks/nodejs"

[build]
include = [
  "app/**",
  "components/**",
  "contexts/**",
  "lib/**",
  "public/**",
  "*.js",
  "*.ts",
  "*.json",
  "*.mjs",
  "*.css",
  "*.config.*",
  "Procfile"
]

[[build.env]]
name = "GOOGLE_ENTRYPOINT"
value = "npm run start"

[[build.env]]
name = "GOOGLE_BUILDABLE"
value = "package.json"
